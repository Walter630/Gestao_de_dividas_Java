spring.application.name=Gestao_de_Contas

# Banco de Dados (Railway fornece POSTGRES_URL, POSTGRES_USER, POSTGRES_PASSWORD)
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/gestao_contas}
spring.datasource.username=${POSTGRES_USER:gestao_contas}
spring.datasource.password=${POSTGRES_PASSWORD:admin}

# RabbitMQ (serviço externo ou variáveis de ambiente)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=1

# JWT
security.token=${JWT_SECRET:secret-key-padrao-para-teste-suficientemente-longa}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.threads.virtual.enabled=true

# Swagger
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Email
app.notification.destinatario=${NOTIFICATION_EMAIL:walterro465@gmail.com}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_DE_USER:walterro465@gmail.com}
spring.mail.password=${PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mercado Pago
mp.access-token=${MP_ACCESS_TOKEN:}
mp.webhook-secret=${MP_WEBHOOK_SECRET:}
mp.notification-url=${MP_NOTIFICATION_URL:}

# PIX
pix.chave=${PIX_CHAVE:88921498062}
pix.nome-beneficiario=${PIX_NOME:Gestao dividas}
pix.cidade=${PIX_CIDADE:Brasilia}

# Actuator
management.endpoints.web.exposure.include=health

# Faz com que a mensagem não volte para a fila se der erro de lógica
spring.rabbitmq.listener.simple.default-requeue-rejected=false