version: '3.9'

services:

  # ─── Reverse Proxy (Entrada do sistema) ───────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: gestao_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
    networks:
      - app-network
  # ─── Aplicacao ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao_dividas_app
    expose:
      - "8080"         # NÃO expõe para fora
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # ─── PostgreSql ───────────────────────────────────────

  postgres:
    container_name: sistema_gestao
    image: postgres:16-alpine
    ports:
      - "5432:5432"    # ← adiciona isso
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network

  # ─── RabbitMQ ───────────────────────────────────────

  rabbitmq:
    container_name: gestao_rabbitmq
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"    # ← adiciona isso
      - "15672:15672"  # painel de admin
    environment:
      RABBITMQ_DEFAULT_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network

  # ─── Redis (Cache / Segurança) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gestao_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:

networks:
  app-network:
    driver: bridge
